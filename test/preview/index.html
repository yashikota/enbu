<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>enbu Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }
    header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header .badge {
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      background: #1f6feb;
      color: #fff;
    }
    main { max-width: 1200px; margin: 0 auto; padding: 2rem; display: grid; gap: 2rem; }
    section { display: grid; gap: 1rem; }
    h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .web-frame {
      border: 1px solid #21262d;
      border-radius: 8px;
      overflow: hidden;
      background: #161b22;
    }
    .web-frame iframe {
      width: 100%;
      height: 600px;
      display: block;
      border: none;
    }
    .gif-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .gif-card {
      border: 1px solid #21262d;
      border-radius: 8px;
      overflow: hidden;
      background: #161b22;
    }
    .gif-card figcaption {
      padding: 0.6rem 0.75rem;
      font-size: 0.85rem;
      color: #8b949e;
      border-top: 1px solid #21262d;
    }
    .gif-card img { width: 100%; display: block; }
  </style>
</head>
<body>
  <header>
    <h1>enbu</h1>
    <span class="badge" id="ref-badge">preview</span>
  </header>
  <main>
    <section>
      <h2>Web UI</h2>
      <div class="web-frame">
        <iframe src="./web/?mock" title="enbu Web UI preview"></iframe>
      </div>
    </section>
    <section>
      <h2>TUI</h2>
      <div class="gif-grid">
        <figure class="gif-card">
          <img src="./secrets-list.gif" alt="Secrets list view">
          <figcaption>Secrets List</figcaption>
        </figure>
        <figure class="gif-card">
          <img src="./add-secret.gif" alt="Add secret flow">
          <figcaption>Add Secret</figcaption>
        </figure>
        <figure class="gif-card">
          <img src="./env-switch.gif" alt="Environment switch">
          <figcaption>Environment Switch</figcaption>
        </figure>
      </div>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const ref = params.get("ref");
    if (ref) document.getElementById("ref-badge").textContent = ref;
  </script>
</body>
</html>
