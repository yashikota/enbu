name: enbu
description: Install enbu and synchronize encrypted secrets for repository recipients.

inputs:
  version:
    description: enbu release version to install.
    required: false
    default: v0.1

runs:
  using: composite
  steps:
    - name: Cache enbu binary
      id: cache-enbu
      uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: ${{ runner.temp }}/enbu/bin/enbu
        key: enbu-${{ inputs.version }}-${{ runner.os }}-${{ runner.arch }}

    - name: Install enbu
      if: steps.cache-enbu.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail

        if [[ "${RUNNER_OS}" != "Linux" || "${RUNNER_ARCH}" != "X64" ]]; then
          echo "enbu action currently supports Linux x64 runners only" >&2
          exit 1
        fi

        mkdir -p "${RUNNER_TEMP}/enbu/bin"
        workdir="$(mktemp -d)"
        trap 'rm -rf "${workdir}"' EXIT

        cd "${workdir}"
        curl -fsSL "https://github.com/yashikota/enbu/releases/download/${{ inputs.version }}/enbu_linux_amd64.tar.gz" -o enbu_linux_amd64.tar.gz
        curl -fsSL "https://github.com/yashikota/enbu/releases/download/${{ inputs.version }}/checksums.txt" -o checksums.txt
        grep enbu_linux_amd64.tar.gz checksums.txt | sha256sum -c -
        tar xzf enbu_linux_amd64.tar.gz enbu
        install enbu "${RUNNER_TEMP}/enbu/bin/enbu"

    - name: Run enbu sync
      shell: bash
      run: ${{ runner.temp }}/enbu/bin/enbu sync
