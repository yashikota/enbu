name: enbu
description: Install enbu and synchronize encrypted secrets for repository recipients.

inputs:
  version:
    description: enbu release version to install. Defaults to the matching release tag for the action ref.
    required: false
    default: ""
  github-token:
    description: GitHub token used to access repository packages.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Resolve enbu release
      id: resolve
      shell: bash
      env:
        REQUESTED_VERSION: ${{ inputs.version }}
        ACTION_REF: ${{ github.action_ref }}
        ACTION_REPOSITORY: ${{ github.action_repository }}
      run: |
        set -euo pipefail

        version="${REQUESTED_VERSION}"
        if [[ -z "${version}" ]]; then
          if [[ "${ACTION_REF}" =~ ^v[0-9A-Za-z._-]+$ ]]; then
            version="${ACTION_REF}"
          elif [[ "${ACTION_REF}" =~ ^[0-9a-f]{40}$ ]]; then
            version="$(
              git ls-remote --tags "https://github.com/${ACTION_REPOSITORY}.git" |
                awk -v sha="${ACTION_REF}" '$1 == sha && $2 ~ /^refs\/tags\/v[0-9A-Za-z._-]+$/ { sub("refs/tags/", "", $2); print $2 }' |
                sort -V |
                tail -n 1
            )"
          fi
        fi

        if [[ -z "${version}" ]]; then
          echo "could not resolve enbu version from action ref: ${ACTION_REF}" >&2
          exit 1
        fi
        if [[ ! "${version}" =~ ^v[0-9A-Za-z._-]+$ ]]; then
          echo "invalid enbu version: ${version}" >&2
          exit 1
        fi

        case "${RUNNER_OS}" in
          Linux) os="linux"; ext="tar.gz"; binary="enbu" ;;
          macOS) os="darwin"; ext="tar.gz"; binary="enbu" ;;
          Windows) os="windows"; ext="zip"; binary="enbu.exe" ;;
          *)
            echo "unsupported runner OS: ${RUNNER_OS}" >&2
            exit 1
            ;;
        esac

        case "${RUNNER_ARCH}" in
          X64) arch="amd64" ;;
          ARM64) arch="arm64" ;;
          *)
            echo "unsupported runner architecture: ${RUNNER_ARCH}" >&2
            exit 1
            ;;
        esac

        echo "version=${version}" >> "${GITHUB_OUTPUT}"
        echo "asset=enbu_${os}_${arch}.${ext}" >> "${GITHUB_OUTPUT}"
        echo "binary=${binary}" >> "${GITHUB_OUTPUT}"
        echo "binary-path=${RUNNER_TEMP}/enbu/bin/${binary}" >> "${GITHUB_OUTPUT}"

    - name: Cache enbu binary
      id: cache-enbu
      uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: ${{ steps.resolve.outputs.binary-path }}
        key: enbu-${{ steps.resolve.outputs.version }}-${{ runner.os }}-${{ runner.arch }}

    - name: Install enbu
      if: steps.cache-enbu.outputs.cache-hit != 'true'
      shell: bash
      env:
        ENBU_VERSION: ${{ steps.resolve.outputs.version }}
        ENBU_ASSET: ${{ steps.resolve.outputs.asset }}
        ENBU_BINARY: ${{ steps.resolve.outputs.binary }}
        ENBU_BINARY_PATH: ${{ steps.resolve.outputs.binary-path }}
      run: |
        set -euo pipefail

        mkdir -p "${RUNNER_TEMP}/enbu/bin"
        workdir="$(mktemp -d)"
        trap 'rm -rf "${workdir}"' EXIT

        cd "${workdir}"
        curl -fsSL "https://github.com/yashikota/enbu/releases/download/${ENBU_VERSION}/${ENBU_ASSET}" -o "${ENBU_ASSET}"
        curl -fsSL "https://github.com/yashikota/enbu/releases/download/${ENBU_VERSION}/checksums.txt" -o checksums.txt
        if command -v sha256sum > /dev/null 2>&1; then
          grep " ${ENBU_ASSET}$" checksums.txt | sha256sum -c -
        else
          grep " ${ENBU_ASSET}$" checksums.txt | shasum -a 256 -c -
        fi

        case "${ENBU_ASSET}" in
          *.tar.gz) tar xzf "${ENBU_ASSET}" "${ENBU_BINARY}" ;;
          *.zip) unzip -q "${ENBU_ASSET}" "${ENBU_BINARY}" ;;
        esac
        cp "${ENBU_BINARY}" "${ENBU_BINARY_PATH}"
        chmod +x "${ENBU_BINARY_PATH}"

    - name: Run enbu sync
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        ENBU_BINARY_PATH: ${{ steps.resolve.outputs.binary-path }}
      run: "${ENBU_BINARY_PATH}" sync
