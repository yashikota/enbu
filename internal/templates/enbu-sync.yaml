# This file is auto-generated by `enbu init`. DO NOT EDIT.
name: Auto Sync Secrets

on:
  registry_package:
    types: [published]

jobs:
  sync:
    if: github.event.registry_package.name == format('{0}-enbu', github.event.repository.name) && startsWith(github.event.registry_package.package_version.container_metadata.tag.name, 'recipient-')
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4
          cache: true

      - name: Cache enbu binary
        id: cache-enbu
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/go/bin/enbu
          key: enbu-${{ runner.os }}-${{ runner.arch }}

      - name: Install enbu
        if: steps.cache-enbu.outputs.cache-hit != 'true'
        run: go install github.com/yashikota/enbu@latest

      - name: Run Sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENBU_SECRET_KEY: ${{ secrets.ENBU_SECRET_KEY }}
        run: ~/go/bin/enbu sync
