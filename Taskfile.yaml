version: '3'

tasks:
  test:
    cmds:
      - go test -v -shuffle=on -race ./... 

  test:scenario:
    cmds:
      - docker compose up -d --wait
      - defer: docker compose down
      - go test -v -shuffle=on -race -tags=scenario ./...

  test:all:
    cmds:
      - task: test
      - task: test:scenario

  lint:
    cmds:
      - golangci-lint run ./... --fix

  fmt:
    cmds:
      - golangci-lint fmt ./...

  frontend:lint:
    dir: web/frontend
    cmds:
      - pnpm run typecheck
      - pnpm run lint

  frontend:fmt:
    dir: web/frontend
    cmds:
      - pnpm run fmt

  frontend:test:
    dir: web/frontend
    cmds:
      - pnpm run test

  frontend:check:
    dir: web/frontend
    cmds:
      - pnpm run check

  build:frontend:
    dir: web/frontend
    cmds:
      - pnpm install --frozen-lockfile
      - pnpm run build

  build:
    cmds:
      - task: build:frontend
      - go build -o enbu .

  check:
    cmds:
      - task: lint
      - task: fmt
      - task: frontend:check
