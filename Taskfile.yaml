version: '3'

tasks:
  test:
    cmds:
      - go test -v -shuffle=on -race ./... 

  test:scenario:
    cmds:
      - docker compose up -d --wait
      - defer: docker compose down
      - go test -v -shuffle=on -race -tags=scenario ./...

  test:all:
    cmds:
      - task: test
      - task: test:scenario

  lint:
    cmds:
      - golangci-lint run ./... --fix

  fmt:
    cmds:
      - golangci-lint fmt ./...

  build:
    cmds:
      - go build -o enbu .

  check:
    cmds:
      - task: lint
      - task: fmt
