version: '3'

tasks:
  default:
    desc: List all available tasks
    silent: true
    cmds:
      - task --list-all --sort alphanumeric

  test:
    desc: Run all tests
    deps:
      - test/unit
      - test/scenario
      - test/web

  test/unit:
    desc: Run unit tests
    deps:
      - build/frontend
    cmds:
      - go test -v -shuffle=on -race ./...

  test/scenario:
    desc: Run scenario tests
    deps:
      - build/frontend
    cmds:
      - docker compose up -d --wait
      - defer: docker compose down
      - curl --fail --silent --show-error --retry 50 --retry-delay 0 --retry-connrefused --retry-max-time 30 http://localhost:5000/v2/
      - go test -v -shuffle=on -race -tags=scenario ./...

  test/web:
    desc: Run web tests
    deps:
      - build/frontend
    dir: web
    cmds:
      - vp test

  build:
    desc: Build CLI and GUI
    deps:
      - build/cli
      - build/gui

  build/cli:
    desc: Build CLI
    deps:
      - build/frontend
    cmds:
      - go build -o enbu .

  build/gui:
    desc: Build GUI desktop app
    deps:
      - build/frontend
    dir: desktop/wails
    cmds:
      - mkdir -p build
      - cp ../../assets/icon.png build/appicon.png
      - go run github.com/wailsapp/wails/v2/cmd/wails@v2.13.0 build -nosyncgomod -m

  check:
    desc: Format and lint all code
    deps:
      - check/go
      - check/web

  check/go:
    desc: Format and lint Go code
    cmds:
      - golangci-lint run --fix ./...
      - golangci-lint fmt ./...

  check/web:
    desc: Format and lint web code
    deps:
      - web/install
    dir: web
    cmds:
      - vp check

  preview/web:
    desc: Build web frontend in mock/preview mode
    deps:
      - web/install
    dir: web
    cmds:
      - vp run build:preview

  preview/tui:
    desc: Build TUI demo and run VHS tapes locally
    cmds:
      - go build -o tui-demo ./test/preview/tui-demo
      - mkdir -p test/preview/vhs/out
      - sh -c 'export PATH="$PWD:$PATH"; for tape in test/preview/vhs/*.tape; do vhs "$tape"; done'
    preconditions:
      - sh: command -v vhs
        msg: "VHS not installed. Install with: go install github.com/charmbracelet/vhs@latest"

  web/install:
    internal: true
    run: once
    dir: web
    cmds:
      - vp install --frozen-lockfile

  build/frontend:
    internal: true
    run: once
    deps:
      - web/install
    dir: web
    cmds:
      - vp run build
