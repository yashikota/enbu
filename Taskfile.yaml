version: '3'

tasks:
  default:
    desc: List all available tasks
    silent: true
    cmds:
      - task --list-all --sort alphanumeric

  all/test:
    desc: Run all tests
    deps:
      - cli/test
      - gui/test
      - scripts/test

  cli/test:
    desc: Run all CLI tests
    deps:
      - cli/test/unit
      - cli/test/scenario

  cli/test/unit:
    desc: Run unit tests
    deps:
      - gui/build/frontend
    cmds:
      - go test -v -shuffle=on -race ./...

  cli/test/scenario:
    desc: Run scenario tests
    deps:
      - gui/build/frontend
    cmds:
      - docker compose up -d --wait
      - defer: docker compose down
      - curl --fail --silent --show-error --retry 50 --retry-delay 0 --retry-connrefused --retry-max-time 30 http://localhost:5000/v2/
      - go test -v -shuffle=on -race -tags=scenario ./...

  gui/test:
    desc: Run GUI tests
    deps:
      - gui/build/frontend
    dir: web
    cmds:
      - vp test

  scripts/test:
    desc: Run release automation tests
    dir: scripts
    cmds:
      - uv run pytest

  all/build:
    desc: Build CLI and GUI
    deps:
      - cli/build
      - gui/build

  cli/build:
    desc: Build CLI
    deps:
      - gui/build/frontend
    cmds:
      - go build -o enbu .

  gui/build:
    desc: Build GUI desktop app
    deps:
      - gui/build/frontend
    dir: desktop/wails
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "(unset)"
    cmds:
      - mkdir -p build
      - cp ../../assets/icon.png build/appicon.png
      - go run github.com/wailsapp/wails/v2/cmd/wails@v2.13.0 build -nosyncgomod -m -ldflags "-X main.Version={{.VERSION}}"

  gui/run:
    desc: Run GUI desktop app in dev mode
    dir: desktop/wails
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "(unset)"
    cmds:
      - go run github.com/wailsapp/wails/v2/cmd/wails@v2.13.0 dev -nosyncgomod -ldflags "-X main.Version={{.VERSION}}"

  all/check:
    desc: Format and lint all code
    deps:
      - cli/check
      - gui/check
      - scripts/check

  cli/check:
    desc: Format and lint CLI code
    deps:
      - gui/build/frontend
    cmds:
      - golangci-lint run --fix ./...
      - golangci-lint fmt ./...

  gui/check:
    desc: Format and lint GUI code
    deps:
      - gui/install
    dir: web
    cmds:
      - vp check

  scripts/check:
    desc: Check Python formatting and lint
    dir: scripts
    cmds:
      - uv run ruff format --check .
      - uv run ruff check .

  scripts/fmt:
    desc: Format Python release automation
    dir: scripts
    cmds:
      - uv run ruff check --fix .
      - uv run ruff format .

  scripts/lint:
    desc: Lint Python release automation
    dir: scripts
    cmds:
      - uv run ruff check .

  gui/preview:
    desc: Build GUI frontend in mock/preview mode
    deps:
      - gui/install
    dir: web
    cmds:
      - vp run build:preview

  cli/preview:
    desc: Build TUI demo and run VHS tapes locally
    cmds:
      - go build -o tui-demo ./test/preview/tui-demo
      - mkdir -p test/preview/vhs/out
      - sh -c 'export PATH="$PWD:$PATH"; for tape in test/preview/vhs/*.tape; do vhs "$tape"; done'
    preconditions:
      - sh: command -v vhs
        msg: "VHS not installed. Install with: go install github.com/charmbracelet/vhs@latest"

  gui/install:
    internal: true
    run: once
    dir: web
    cmds:
      - vp install --frozen-lockfile

  gui/build/frontend:
    internal: true
    run: once
    deps:
      - gui/install
    dir: web
    cmds:
      - vp run build
