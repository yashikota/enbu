version: '3'

tasks:
  test:
    deps:
      - build:frontend
    cmds:
      - sh -c "go list ./... | grep -v '/desktop/wails$' | xargs go test -v -shuffle=on -race"

  test:scenario:
    deps:
      - build:frontend
    cmds:
      - docker compose up -d --wait
      - defer: docker compose down
      - sh -c "go list ./... | grep -v '/desktop/wails$' | xargs go test -v -shuffle=on -race -tags=scenario"

  test:all:
    cmds:
      - task: test
      - task: test:scenario

  lint:
    cmds:
      - sh -c "go list ./... | grep -v '/desktop/wails$' | sed 's#^github.com/yashikota/enbu#.#' | xargs golangci-lint run --fix"

  fmt:
    cmds:
      - sh -c "go list ./... | grep -v '/desktop/wails$' | sed 's#^github.com/yashikota/enbu#.#' | xargs golangci-lint fmt"

  frontend:lint:
    dir: web
    cmds:
      - vp lint

  frontend:fmt:
    dir: web
    cmds:
      - vp fmt

  frontend:test:
    dir: web
    cmds:
      - vp test

  frontend:check:
    dir: web
    cmds:
      - vp install --frozen-lockfile
      - vp run build
      - vp check
      - vp test

  build:frontend:
    dir: web
    cmds:
      - vp install --frozen-lockfile
      - vp run build

  build:
    cmds:
      - task: build:frontend
      - go build -o enbu .

  build:desktop:
    deps:
      - build:frontend
    dir: desktop/wails
    cmds:
      - mkdir -p build
      - cp ../../assets/icon.png build/appicon.png
      - go run github.com/wailsapp/wails/v2/cmd/wails@v2.13.0 build -nosyncgomod -m

  check:
    deps:
      - build:frontend
    cmds:
      - task: lint
      - task: fmt
      - task: frontend:check

  preview:web:
    desc: Build web frontend in mock/preview mode
    dir: web
    cmds:
      - vp install --frozen-lockfile
      - vp run build:preview

  preview:tui:
    desc: Build TUI demo and run VHS tapes locally
    cmds:
      - go build -o tui-demo ./test/preview/tui-demo
      - mkdir -p test/preview/vhs/out
      - sh -c 'export PATH="$PWD:$PATH"; for tape in test/preview/vhs/*.tape; do vhs "$tape"; done'
    preconditions:
      - sh: command -v vhs
        msg: "VHS not installed. Install with: go install github.com/charmbracelet/vhs@latest"
