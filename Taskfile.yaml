version: '3'

tasks:
  test:
    deps:
      - build:frontend
    cmds:
      - sh -c "go list ./... | grep -v '/cmd/enbu-desktop$' | xargs go test -v -shuffle=on -race"

  test:scenario:
    deps:
      - build:frontend
    cmds:
      - docker compose up -d --wait
      - defer: docker compose down
      - sh -c "go list ./... | grep -v '/cmd/enbu-desktop$' | xargs go test -v -shuffle=on -race -tags=scenario"

  test:all:
    cmds:
      - task: test
      - task: test:scenario

  lint:
    cmds:
      - sh -c "go list ./... | grep -v '/cmd/enbu-desktop$' | sed 's#^github.com/yashikota/enbu#.#' | xargs golangci-lint run --fix"

  fmt:
    cmds:
      - sh -c "go list ./... | grep -v '/cmd/enbu-desktop$' | sed 's#^github.com/yashikota/enbu#.#' | xargs golangci-lint fmt"

  frontend:lint:
    dir: web/frontend
    cmds:
      - pnpm run typecheck
      - pnpm run lint

  frontend:fmt:
    dir: web/frontend
    cmds:
      - pnpm run fmt

  frontend:test:
    dir: web/frontend
    cmds:
      - pnpm run test

  frontend:check:
    dir: web/frontend
    cmds:
      - pnpm run check

  build:frontend:
    dir: web/frontend
    cmds:
      - pnpm install --frozen-lockfile
      - pnpm run build

  build:
    cmds:
      - task: build:frontend
      - go build -o enbu .

  build:desktop:
    deps:
      - build:frontend
    dir: cmd/enbu-desktop
    cmds:
      - mkdir -p build
      - cp ../../assets/icon.png build/appicon.png
      - go run github.com/wailsapp/wails/v2/cmd/wails@v2.13.0 build -nosyncgomod -m

  check:
    deps:
      - build:frontend
    cmds:
      - task: lint
      - task: fmt
      - task: frontend:check
