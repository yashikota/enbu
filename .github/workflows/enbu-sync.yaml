# This file is auto-generated by `enbu init`. DO NOT EDIT.
name: Auto Sync Secrets

on:
  registry_package:
    types: [published]
  workflow_dispatch:

jobs:
  sync:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.registry_package.name == format('{0}-enbu', github.event.repository.name) &&
       startsWith(github.event.registry_package.package_version.container_metadata.tag.name, 'recipient-'))
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: 1.26.4
          cache: true

      - name: Cache enbu binary
        id: cache-enbu
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/go/bin/enbu
          key: enbu-${{ runner.os }}-${{ runner.arch }}

      - name: Install enbu
        if: steps.cache-enbu.outputs.cache-hit != 'true'
        run: go install github.com/yashikota/enbu@feat/v0.1

      - name: Run Sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENBU_SECRET_KEY: ${{ secrets.ENBU_SECRET_KEY }}
        run: ~/go/bin/enbu sync
