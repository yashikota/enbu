# This file is auto-generated by `enbu init`. DO NOT EDIT.
name: Auto Sync Secrets

on:
  registry_package:
    types: [published]
  workflow_dispatch:

env:
  ENBU_VERSION: v0.1

jobs:
  sync:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.registry_package.name == format('{0}-enbu', github.event.repository.name) &&
       startsWith(github.event.registry_package.package_version.container_metadata.tag.name, 'recipient-'))
    
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      packages: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache enbu binary
        id: cache-enbu
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: /usr/local/bin/enbu
          key: enbu-${{ env.ENBU_VERSION }}-linux-amd64

      - name: Install enbu
        if: steps.cache-enbu.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://github.com/yashikota/enbu/releases/download/${ENBU_VERSION}/enbu_linux_amd64.tar.gz -o enbu_linux_amd64.tar.gz
          curl -fsSL https://github.com/yashikota/enbu/releases/download/${ENBU_VERSION}/checksums.txt -o checksums.txt
          grep enbu_linux_amd64.tar.gz checksums.txt | sha256sum -c -
          tar xvf enbu_linux_amd64.tar.gz enbu
          install enbu /usr/local/bin/enbu

      - name: Run Sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENBU_SECRET_KEY: ${{ secrets.ENBU_SECRET_KEY }}
        run: enbu sync
