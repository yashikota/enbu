name: Auto Sync Secrets

on:
  registry_package:
    types: [published]
  workflow_dispatch:

jobs:
  sync:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.registry_package.name == format('{0}-enbu', github.event.repository.name) &&
       startsWith(github.event.registry_package.package_version.container_metadata.tag.name, 'recipient-'))
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install enbu
        env:
          ENBU_SHA256: bc4737e16d76f9cccaaf2fa7a23ff6651ad690fc63ec123bb431b3cad04a9ac4
        run: |
          curl -fsSL https://github.com/yashikota/enbu/releases/download/v0.1/enbu_linux_amd64.tar.gz -o enbu.tar.gz
          echo "${ENBU_SHA256}  enbu.tar.gz" | sha256sum -c -
          tar xzf enbu.tar.gz enbu
          install enbu /usr/local/bin/enbu

      - name: Run Sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENBU_SECRET_KEY: ${{ secrets.ENBU_SECRET_KEY }}
        run: enbu sync
