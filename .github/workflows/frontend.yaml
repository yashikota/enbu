name: Frontend

on:
  push:
    branches: [main]
    paths:
      - web/frontend/**
      - aqua.yaml
  pull_request:
    paths:
      - web/frontend/**
      - aqua.yaml

jobs:
  check:
    name: Frontend check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/aquaproj-aqua
          key: v2-aqua-installer-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('aqua.yaml') }}
          restore-keys: |
            v2-aqua-installer-${{ runner.os }}-${{ runner.arch }}-

      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.1

      - name: Frontend check
        run: task frontend:check
