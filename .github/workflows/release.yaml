name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  cli:
    name: Build CLI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI artifacts
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-cli
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/share/aquaproj-aqua
          key: v2-aqua-installer-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('aqua.yaml') }}
          restore-keys: |
            v2-aqua-installer-${{ runner.os }}-${{ runner.arch }}-

      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.1

      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          run-install: false

      - name: Build frontend for Go embed
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-dist
          path: web/dist
          if-no-files-found: error

  desktop:
    name: Build desktop (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    needs: frontend
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            suffix: windows_amd64
            package: zip
          - os: windows-11-arm
            platform: windows/arm64
            suffix: windows_arm64
            package: zip
          - os: macos-latest
            platform: darwin/arm64
            suffix: darwin_arm64
            package: dmg
          - os: ubuntu-22.04
            platform: linux/amd64
            suffix: linux_amd64
            package: tar.gz
          - os: ubuntu-22.04-arm
            platform: linux/arm64
            suffix: linux_arm64
            package: tar.gz
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download frontend artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-dist
          path: web/dist

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Prepare Wails icon
        shell: bash
        run: |
          mkdir -p desktop/wails/build
          cp assets/icon.png desktop/wails/build/appicon.png

      - name: Build Wails app
        shell: bash
        working-directory: desktop/wails
        env:
          WAILS_PLATFORM: ${{ matrix.platform }}
        run: |
          go run github.com/wailsapp/wails/v2/cmd/wails@v2.13.0 build \
            -platform "$WAILS_PLATFORM" \
            -nosyncgomod \
            -m \
            -s \
            -trimpath

      - name: Package desktop app
        if: matrix.package == 'tar.gz'
        shell: bash
        env:
          DESKTOP_SUFFIX: ${{ matrix.suffix }}
        run: |
          mkdir -p release
          tar -C desktop/wails/build/bin \
            -czf "release/enbu-desktop_${GITHUB_REF_NAME}_${DESKTOP_SUFFIX}.tar.gz" \
            .

      - name: Package desktop app
        if: matrix.package == 'dmg'
        shell: bash
        env:
          DESKTOP_SUFFIX: ${{ matrix.suffix }}
        run: |
          set -euo pipefail
          app_path="$(find desktop/wails/build/bin -maxdepth 1 -type d -name '*.app' -print -quit)"
          test -n "$app_path"
          mkdir -p release
          python3 -m venv "$RUNNER_TEMP/dmgbuild"
          "$RUNNER_TEMP/dmgbuild/bin/pip" install \
            --disable-pip-version-check \
            dmgbuild==1.6.7
          "$RUNNER_TEMP/dmgbuild/bin/dmgbuild" \
            -s .github/dmg-settings.py \
            -D app="$app_path" \
            enbu \
            "release/enbu-desktop_${GITHUB_REF_NAME}_${DESKTOP_SUFFIX}.dmg"

      - name: Package desktop app
        if: matrix.package == 'zip'
        shell: pwsh
        env:
          DESKTOP_SUFFIX: ${{ matrix.suffix }}
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $binary = Get-ChildItem desktop/wails/build/bin -Filter *.exe | Select-Object -First 1
          if ($null -eq $binary) {
            throw "Wails did not produce a Windows executable"
          }
          $staging = Join-Path $env:RUNNER_TEMP "enbu-desktop"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item `
            -Path $binary.FullName `
            -Destination (Join-Path $staging "enbu-desktop.exe")
          Compress-Archive `
            -Path (Join-Path $staging "enbu-desktop.exe") `
            -DestinationPath "release/enbu-desktop_${env:GITHUB_REF_NAME}_${env:DESKTOP_SUFFIX}.zip"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-enbu-desktop-${{ matrix.suffix }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish immutable release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - cli
      - desktop
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate SBOMs
        shell: bash
        run: |
          set -euo pipefail
          for artifact in release-assets/*; do
            [ -f "$artifact" ] || continue
            syft "$artifact" -o spdx-json > "${artifact}.sbom.spdx.json"
          done

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          (
            cd release-assets
            find . -maxdepth 1 -type f \
              ! -name '*.sigstore.json' \
              ! -name 'checksums.txt' \
              -printf '%P\0' |
              sort -z |
              xargs -0 sha256sum > checksums.txt
          )

      - name: Sign release assets
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          for artifact in release-assets/*; do
            [ -f "$artifact" ] || continue
            case "$artifact" in
              *.sigstore.json) continue ;;
            esac
            cosign sign-blob \
              --bundle="${artifact}.sigstore.json" \
              "$artifact" \
              --yes
          done

      - name: Generate artifact attestations
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: release-assets/*

      - name: Verify release asset set
        shell: bash
        run: |
          set -euo pipefail
          test -s release-assets/checksums.txt
          test "$(find release-assets -maxdepth 1 -type f -name 'enbu_*' | wc -l)" -gt 0
          test "$(find release-assets -maxdepth 1 -type f -name 'enbu-desktop_*' | wc -l)" -gt 0
          test "$(find release-assets -maxdepth 1 -type f -name 'enbu-desktop_*_windows_*.exe' | wc -l)" -eq 0
          test "$(find release-assets -maxdepth 1 -type f -name 'enbu-desktop_*_windows_*.zip' | wc -l)" -eq 2
          test "$(find release-assets -maxdepth 1 -type f -name 'enbu-desktop_*_darwin_*.dmg' | wc -l)" -eq 1
          test "$(find release-assets -maxdepth 1 -type f -name 'enbu-desktop_*_darwin_*.tar.gz' | wc -l)" -eq 0
          test "$(find release-assets -maxdepth 1 -type f -name '*.sbom.spdx.json' | wc -l)" -gt 0
          test "$(find release-assets -maxdepth 1 -type f -name '*.sigstore.json' | wc -l)" -gt 0
          (cd release-assets && sha256sum -c checksums.txt)

      - name: Generate release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$GITHUB_REF_NAME" \
            --jq .body > generated-notes.md
          python3 scripts/generate_release_notes.py \
            --assets-dir release-assets \
            --repository "$GITHUB_REPOSITORY" \
            --tag "$GITHUB_REF_NAME" \
            --generated-notes generated-notes.md \
            > release-notes.md

      - name: Create draft release with all assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --draft \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$GITHUB_REF_NAME" --draft=false
