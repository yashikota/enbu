name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  cli:
    name: Build CLI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI artifacts
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-cli
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  desktop:
    name: Build desktop (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            suffix: windows_amd64
            archive: zip
          - os: macos-13
            platform: darwin/amd64
            suffix: darwin_amd64
            archive: tar.gz
          - os: macos-latest
            platform: darwin/arm64
            suffix: darwin_arm64
            archive: tar.gz
          - os: ubuntu-22.04
            platform: linux/amd64
            suffix: linux_amd64
            archive: tar.gz
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.10.0
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Prebuild frontend for Go embed
        shell: bash
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Prepare Wails icon
        shell: bash
        run: |
          mkdir -p desktop/wails/build
          cp assets/icon.png desktop/wails/build/appicon.png

      - name: Build Wails app
        shell: bash
        working-directory: desktop/wails
        env:
          WAILS_PLATFORM: ${{ matrix.platform }}
        run: |
          go run github.com/wailsapp/wails/v2/cmd/wails@v2.13.0 build \
            -platform "$WAILS_PLATFORM" \
            -nosyncgomod \
            -m \
            -trimpath

      - name: Package desktop app
        if: matrix.archive == 'tar.gz'
        shell: bash
        env:
          DESKTOP_SUFFIX: ${{ matrix.suffix }}
        run: |
          mkdir -p release
          tar -C desktop/wails/build/bin \
            -czf "release/enbu_${GITHUB_REF_NAME}_${DESKTOP_SUFFIX}-desktop.tar.gz" \
            .

      - name: Package desktop app
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          DESKTOP_SUFFIX: ${{ matrix.suffix }}
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive `
            -Path desktop/wails/build/bin/* `
            -DestinationPath "release/enbu_${env:GITHUB_REF_NAME}_${env:DESKTOP_SUFFIX}-desktop.zip"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-desktop-${{ matrix.suffix }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish immutable release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - cli
      - desktop
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate SBOMs
        shell: bash
        run: |
          set -euo pipefail
          for artifact in release-assets/*; do
            [ -f "$artifact" ] || continue
            syft "$artifact" -o spdx-json > "${artifact}.sbom.spdx.json"
          done

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          (
            cd release-assets
            find . -maxdepth 1 -type f \
              ! -name '*.sigstore.json' \
              ! -name 'checksums.txt' \
              -printf '%P\0' |
              sort -z |
              xargs -0 sha256sum > checksums.txt
          )

      - name: Sign release assets
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          for artifact in release-assets/*; do
            [ -f "$artifact" ] || continue
            case "$artifact" in
              *.sigstore.json) continue ;;
            esac
            cosign sign-blob \
              --bundle="${artifact}.sigstore.json" \
              "$artifact" \
              --yes
          done

      - name: Generate artifact attestations
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: release-assets/*

      - name: Verify release asset set
        shell: bash
        run: |
          set -euo pipefail
          test -s release-assets/checksums.txt
          test "$(find release-assets -maxdepth 1 -type f -name 'enbu_*' | wc -l)" -gt 0
          test "$(find release-assets -maxdepth 1 -type f -name 'enbu_*-desktop*' | wc -l)" -gt 0
          test "$(find release-assets -maxdepth 1 -type f -name '*.sbom.spdx.json' | wc -l)" -gt 0
          test "$(find release-assets -maxdepth 1 -type f -name '*.sigstore.json' | wc -l)" -gt 0
          (cd release-assets && sha256sum -c checksums.txt)

      - name: Create draft release with all assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --draft \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$GITHUB_REF_NAME" --draft=false
