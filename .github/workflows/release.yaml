name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  cli:
    name: Build CLI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI artifacts
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-cli
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  desktop:
    name: Build desktop (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            suffix: windows_amd64
            archive: zip
          - os: macos-13
            platform: darwin/amd64
            suffix: darwin_amd64
            archive: tar.gz
          - os: macos-latest
            platform: darwin/arm64
            suffix: darwin_arm64
            archive: tar.gz
          - os: ubuntu-22.04
            platform: linux/amd64
            suffix: linux_amd64
            archive: tar.gz
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 11.10.0
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/frontend/pnpm-lock.yaml

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Prebuild frontend for Go embed
        shell: bash
        working-directory: web/frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build Wails app
        shell: bash
        working-directory: cmd/enbu-desktop
        env:
          WAILS_PLATFORM: ${{ matrix.platform }}
        run: |
          go run github.com/wailsapp/wails/v2/cmd/wails@v2.13.0 build \
            -platform "$WAILS_PLATFORM" \
            -trimpath

      - name: Package desktop app
        if: matrix.archive == 'tar.gz'
        shell: bash
        env:
          DESKTOP_SUFFIX: ${{ matrix.suffix }}
        run: |
          mkdir -p release
          tar -C cmd/enbu-desktop/build/bin \
            -czf "release/enbu-desktop_${GITHUB_REF_NAME}_${DESKTOP_SUFFIX}.tar.gz" \
            .

      - name: Package desktop app
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          DESKTOP_SUFFIX: ${{ matrix.suffix }}
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive `
            -Path cmd/enbu-desktop/build/bin/* `
            -DestinationPath "release/enbu-desktop_${env:GITHUB_REF_NAME}_${env:DESKTOP_SUFFIX}.zip"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-desktop-${{ matrix.suffix }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish immutable release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - cli
      - desktop
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate SBOMs
        shell: bash
        run: |
          set -euo pipefail
          for artifact in release-assets/*; do
            [ -f "$artifact" ] || continue
            syft "$artifact" -o spdx-json > "${artifact}.sbom.spdx.json"
          done

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          (
            cd release-assets
            find . -maxdepth 1 -type f \
              ! -name '*.sigstore.json' \
              ! -name 'checksums.txt' \
              -printf '%P\0' |
              sort -z |
              xargs -0 sha256sum > checksums.txt
          )

      - name: Sign release assets
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          for artifact in release-assets/*; do
            [ -f "$artifact" ] || continue
            case "$artifact" in
              *.sigstore.json) continue ;;
            esac
            cosign sign-blob \
              --bundle="${artifact}.sigstore.json" \
              "$artifact" \
              --yes
          done

      - name: Generate artifact attestations
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: release-assets/*

      - name: Verify release asset set
        shell: bash
        run: |
          set -euo pipefail
          test -s release-assets/checksums.txt
          test "$(find release-assets -maxdepth 1 -type f -name 'enbu_*' | wc -l)" -gt 0
          test "$(find release-assets -maxdepth 1 -type f -name 'enbu-desktop_*' | wc -l)" -gt 0
          test "$(find release-assets -maxdepth 1 -type f -name '*.sbom.spdx.json' | wc -l)" -gt 0
          test "$(find release-assets -maxdepth 1 -type f -name '*.sigstore.json' | wc -l)" -gt 0
          (cd release-assets && sha256sum -c checksums.txt)

      - name: Create draft release with all assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --draft \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$GITHUB_REF_NAME" --draft=false
