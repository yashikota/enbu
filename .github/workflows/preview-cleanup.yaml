name: Preview Cleanup

on:
  pull_request:
    types: [closed]

permissions: {}

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup:
    name: Remove PR Preview
    concurrency:
      group: preview-store
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pages: write
      id-token: write
      pull-requests: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Remove PR directory from store
        id: cleanup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if ! git ls-remote --exit-code "$REPO_URL" "refs/heads/_preview-store" > /dev/null 2>&1; then
            echo "No _preview-store branch found, nothing to clean up."
            exit 0
          fi
          git clone --depth 1 --branch _preview-store "$REPO_URL" store
          cd store || exit 1
          if [ ! -d "pr-${PR_NUMBER}" ]; then
            echo "pr-${PR_NUMBER} not found, nothing to clean up."
            exit 0
          fi
          rm -rf "pr-${PR_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "preview: remove pr-${PR_NUMBER}"
          git push origin _preview-store:_preview-store
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

      - name: Find preview comment
        id: find-comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- enbu-preview -->"

      - name: Mark preview as expired
        if: steps.find-comment.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- enbu-preview -->
            ## Preview expired

            This preview was removed when the pull request was closed.
          edit-mode: replace

      - name: Configure Pages
        if: steps.cleanup.outputs.should_deploy == 'true'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        if: steps.cleanup.outputs.should_deploy == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: store

      - name: Deploy to GitHub Pages
        if: steps.cleanup.outputs.should_deploy == 'true'
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
